server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: job-offer-service
          uri: lb://job-offer-service
          predicates:
            - Path=/api/job-offers/**
        - id: cv-processing-service
          uri: lb://cv-processing-service
          predicates:
            - Path=/api/cv/**
        - id: technical-test-service
          uri: lb://technical-test-service
          predicates:
            - Path=/api/tests/**
        - id: ranking-service
          uri: lb://ranking-service
          predicates:
            - Path=/api/rankings/**
        - id: evaluation-service
          uri: lb://evaluation-service
          predicates:
            - Path=/api/results/**

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
