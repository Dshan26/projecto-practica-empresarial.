server:
  port: 8083

spring:
  application:
    name: cv-processing-service
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/cv_processing_db}
    username: ${SPRING_R2DBC_USERNAME:recruitment}
    password: ${SPRING_R2DBC_PASSWORD:recruitment123}
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/cv_processing_db}
    user: ${SPRING_FLYWAY_USER:recruitment}
    password: ${SPRING_FLYWAY_PASSWORD:recruitment123}
    enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
